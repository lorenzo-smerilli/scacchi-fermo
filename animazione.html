<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Animazione - Scacchi Fermo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">

    <style>
        /* RESET ISOLATO PER L'IFRAME */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FAFAFA;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* ----------------------------------------------------------
           STRUTTURA E STILI ORIGINALI DA ANIMAZ-SOLO.HTML
           ---------------------------------------------------------- */
        .hero-sticker-scene {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sticker-wrapper {
            width: 320px;
            height: 320px;
            position: relative;
            perspective: 1200px;
            transform-style: preserve-3d;
            transition: all 1s ease-in-out;
        }

        /* LAYER 1: GRIGLIA QR CODE */
        .qr-grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            background: #fff;
            padding: 10px;
            border: 4px solid #111;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #111;
            backface-visibility: hidden;
            z-index: 2;
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateZ(1px);
        }

        .qr-box {
            transition: all 0.8s ease-in-out;
        }
        .qr-box.black { background-color: #111; }
        .qr-box.white { background-color: #fff; }

        /* LAYER 2: MATRICE DI CUBETTI TRIDIMENSIONALI ORIGINALI */
        .svg-cubes-matrix-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            transform-style: preserve-3d;
            z-index: 3;
            pointer-events: none;
            padding: 10px;
        }

        .cube-container {
            width: 100%;
            height: 100%;
            perspective: 400px;
            transform-style: preserve-3d;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-15px);
            opacity: 0;
            transition: all 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 0.5px solid rgba(17,17,17,0.15);
        }

        /* Orientamento facce cubi nativo */
        .face.front  { transform: rotateY(0deg) translateZ(15px); }
        .face.back   { transform: rotateY(180deg) translateZ(15px); }
        .face.left   { transform: rotateY(-90deg) translateZ(15px); }
        .face.right  { transform: rotateY(90deg) translateZ(15px); }
        .face.top    { transform: rotateX(90deg) translateZ(15px); }
        .face.bottom { transform: rotateX(-90deg) translateZ(15px); }

        /* LAYER 3: SCACCHIERA REALE GRANDE TRIDIMENSIONALE */
        .chess-3d-board {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            border: 12px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: rotateX(60deg) rotateZ(-45deg) translateZ(-200px);
            opacity: 0;
            backface-visibility: hidden;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
        }

        .inner-3d-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
        }

        .cell { width: 100%; height: 100%; }
        .inner-3d-grid div:nth-child(16n+1), .inner-3d-grid div:nth-child(16n+3),
        .inner-3d-grid div:nth-child(16n+5), .inner-3d-grid div:nth-child(16n+7),
        .inner-3d-grid div:nth-child(16n+10), .inner-3d-grid div:nth-child(16n+12),
        .inner-3d-grid div:nth-child(16n+14), .inner-3d-grid div:nth-child(16n+16) {
            background-color: #f0d9b5;
        }
        .inner-3d-grid div:nth-child(16n+2), .inner-3d-grid div:nth-child(16n+4),
        .inner-3d-grid div:nth-child(16n+6), .inner-3d-grid div:nth-child(16n+8),
        .inner-3d-grid div:nth-child(16n+9), .inner-3d-grid div:nth-child(16n+11),
        .inner-3d-grid div:nth-child(16n+13), .inner-3d-grid div:nth-child(16n+15) {
            background-color: #b58863;
        }

        .board-notation-top {
            position: absolute;
            top: -24px; left: 0; width: 100%;
            display: flex; justify-content: space-around;
            color: #aaa; font-family: monospace; font-size: 11px; text-transform: uppercase;
        }

        .board-notation-left {
            position: absolute;
            top: 0; left: -18px; height: 100%;
            display: flex; flex-direction: column; justify-content: space-around;
            color: #aaa; font-family: monospace; font-size: 11px;
        }

        /* CLAIM FINALE "EPPUR SI MUOVE" */
        .hero-claim-final {
            position: absolute;
            bottom: 20px;
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 2.5rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.1;
            letter-spacing: -1px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            color: #111111;
        }

        /* ----------------------------------------------------------
           CLASSI DINAMICHE DEI TRIGGER DI ANIMAZIONE NATIVI
           ---------------------------------------------------------- */
        .hero-sticker-scene.frenetic-chaos .qr-box:nth-child(odd) {
            transform: scale(0.4) rotate(45deg) translate3d(20px, -30px, 50px);
            opacity: 0.6;
            background-color: #00E676;
        }
        .hero-sticker-scene.frenetic-chaos .qr-box:nth-child(even) {
            transform: scale(0.6) rotate(-35deg) translate3d(-15px, 40px, -40px);
            opacity: 0.4;
        }

        .hero-sticker-scene.frenetic-chaos .cube {
            opacity: 1;
            transform: translateZ(0) rotateX(135deg) rotateY(45deg);
        }

        .hero-sticker-scene.hide-qr-completely .qr-grid-layer {
            opacity: 0;
            transform: scale(0.2) rotate(180deg);
        }

        .hero-sticker-scene.hide-all-svg-layers .svg-cubes-matrix-layer {
            opacity: 0;
            transform: scale(0.5) translateZ(-300px);
            transition: all 1s ease-in;
        }

        .hero-sticker-scene.assemble-board .chess-3d-board {
            opacity: 1;
            transform: rotateX(58deg) rotateZ(-32deg) translateZ(0);
        }

        .hero-sticker-scene.display-claim .hero-claim-final {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <section id="heroSection" class="hero-sticker-scene">
        <div class="sticker-wrapper">
            
            <div class="qr-grid-layer">
                <div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box black"></div><div class="qr-box white"></div>
                <div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div><div class="qr-box white"></div>
            </div>

            <div class="svg-cubes-matrix-layer" id="cubesMatrix"></div>

            <div class="chess-3d-board">
                <div class="board-notation-top">abcdefgh</div>
                <div class="board-notation-left">87654321</div>
                <div class="inner-3d-grid">
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                </div>
            </div>

        </div>

        <div class="hero-claim-final">“Fermo, eppur si muove”</div>
    </section>

    <script>
        const matrixContainer = document.getElementById('cubesMatrix');
        
        // Rigenerazione esatta della matrice di tasselli 3D
        for (let i = 0; i < 64; i++) {
            const container = document.createElement('div');
            container.className = 'cube-container';
            
            const row = Math.floor(i / 8);
            const col = i % 8;
            const isBlack = (row + col) % 2 === 1;
            const primaryColor = isBlack ? '#b58863' : '#f0d9b5';
            
            container.innerHTML = `
                <div class="cube" style="transition-delay: ${i * 12}ms">
                    <div class="face front"  style="background: ${primaryColor}"></div>
                    <div class="face back"   style="background: #222"></div>
                    <div class="face left"   style="background: #333"></div>
                    <div class="face right"  style="background: #444"></div>
                    <div class="face top"    style="background: #555"></div>
                    <div class="face bottom" style="background: #111"></div>
                </div>
            `;
            matrixContainer.appendChild(container);
        }

        const hero = document.getElementById('heroSection');

        function runStickerSequence() {
            if (!hero) return;

            // FASE 2: Scomposizione controllata (3s)
            setTimeout(() => {
                hero.classList.add('frenetic-chaos');
            }, 3000);

            // FASE 3: Chiusura QR e comparsa Scacchiera (6.5s)
            setTimeout(() => {
                hero.classList.add('hide-qr-completely');
                hero.classList.add('hide-all-svg-layers');
                hero.classList.add('assemble-board');
            }, 6500);

            // FASE 4: Claim (8.8s)
            setTimeout(() => {
                hero.classList.add('display-claim');
            }, 8800);

            // RESET COMPLETO (13.5s)
            setTimeout(() => {
                hero.classList.remove('display-claim');
                hero.classList.remove('assemble-board');
                hero.classList.remove('hide-all-svg-layers');
                hero.classList.remove('hide-qr-completely');
                hero.classList.remove('frenetic-chaos');
            }, 13500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            runStickerSequence();
            setInterval(runStickerSequence, 14500);
        });
    </script>
</body>
</html>
