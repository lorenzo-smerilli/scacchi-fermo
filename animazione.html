<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione ASD Scacchi Fermo - Tasselli a Scorrimento Realistici</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-color: #111111;
            --accent-green: #008744;
            --text-dark-muted: #777777;
        }

        body {
            background-color: #FAFAFA;
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* CONTENITORE 3D */
        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .hero-sticker-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            transform-style: preserve-3d;
            animation: automatic-parallax 7s infinite ease-in-out alternate;
        }

        @keyframes automatic-parallax {
            0% { transform: rotateY(-6deg) rotateX(-4deg); }
            100% { transform: rotateY(6deg) rotateX(4deg); }
        }

        /* Layer 1: Sfondo Testi */
        .hero-bg-texti {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('1-sfondo-testi.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            transform: translateZ(-15px);
            transition: opacity 0.8s ease;
        }

        /* Layer 2: IL VERO QR CODE SVG (Sciame di tasselli) */
        .hero-qr-html-grid {
            position: absolute;
            width: 71%; 
            height: 71%;
            top: 14.5%;
            left: 14.5%;
            z-index: 3;
            transform: translateZ(0px);
            transition: opacity 0.4s ease;
        }

        .hero-qr-html-grid svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* SETUP INIZIALE DEI SINGOLI TASSELLI DEL QR CODE */
        .hero-qr-html-grid path {
            /* Transform-box per permettere lo scale dal centro di ogni quadratino */
            transform-box: fill-box;
            transform-origin: center;
            transition: transform 0s, opacity 0.5s ease;
        }

        /* FASE 1: I TASSELLI DEL QR VOLANO VERSO LA SCACCHIERA */
        .hero.slide-puzzle .hero-qr-html-grid path {
            /* Usiamo una curva bezier "back" per l'effetto magnetico a scatto */
            transform: translate(var(--dx), var(--dy)) scale(4);
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) var(--delay);
            z-index: 10;
        }

        /* Layer Coordinate Lettere/Numeri */
        .board-labels {
            position: absolute;
            width: 106%;
            height: 106%;
            top: -3%;
            left: -3%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            font-size: 0.75rem;
            color: var(--text-dark-muted);
            transition: opacity 1s ease;
            transform: translateZ(10px);
        }
        .board-labels .letters { position: absolute; bottom: -18px; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 4%; }
        .board-labels .numbers { position: absolute; left: -18px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 4% 0; }

        /* Layer 4: Grafica Cavallo */
        .hero-cavallo {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('3-cavallo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            transform: translateZ(25px);
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        /* Layer 5: SCACCHIERA REALE 8x8 */
        .hero-qr-animated {
            position: absolute;
            width: 71%; 
            height: 71%; 
            top: 14.5%;
            left: 14.5%;
            z-index: 4;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            opacity: 0; 
            transform: translateZ(0px); 
            transition: opacity 0.4s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sq { width: 100%; height: 100%; }
        .sq.d { background-color: var(--accent-green); }
        .sq.l { background-color: transparent; transition: background-color 1s ease; }

        /* FASE 2: SWAP */
        .hero.swap-board .hero-qr-html-grid { opacity: 0; }
        .hero.swap-board .hero-qr-animated { opacity: 1; }
        
        /* FASE 3: RIVELAZIONE E CLAIM FINALE */
        .hero.reveal-claim .hero-bg-texti,
        .hero.reveal-claim .hero-cavallo {
            opacity: 0; 
        }
        
        .hero.reveal-claim .sq.l {
            background-color: rgba(0, 0, 0, 0.04); 
        }

        .hero.reveal-claim .hero-qr-animated {
            transform: translateZ(15px) scale(1.33); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        .hero.reveal-claim .board-labels { opacity: 1; }

        .hero-claim-final {
            position: absolute;
            z-index: 99; 
            color: var(--text-color);
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: bold;
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            text-align: center;
            width: 100%;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scale(0.96) translateZ(40px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .hero.reveal-claim .hero-claim-final {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) scale(1) translateZ(50px);
        }

        .hero-claim-final::before {
            content: "“Fermo, eppur si muove”";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #FAFAFA; 
            text-shadow: 
                0 0 8px #FAFAFA, 
                0 0 15px #FAFAFA, 
                0 0 25px #FAFAFA, 
                0 0 40px #FAFAFA,
                0 0 60px #FAFAFA,
                0 0 80px #FAFAFA;
            z-index: -1; 
            pointer-events: none;
        }
    </style>
</head>
