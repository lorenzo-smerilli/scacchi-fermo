<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Blocco SVG - ASD Scacchi Fermo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FAFAFA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
        }

        /* Il contenitore mantiene le proporzioni e l'effetto 3D dello sticker */
        .hero-sticker-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            transform-style: preserve-3d;
            animation: automatic-parallax 8s infinite ease-in-out alternate;
        }

        @keyframes automatic-parallax {
            0% { transform: rotateY(-7deg) rotateX(-5deg); }
            100% { transform: rotateY(7deg) rotateX(5deg); }
        }

        /* LAYER 1: SFONDO GRAFICO (Simulato come background solido per il test) */
        .hero-bg-texti {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            border: 2px solid #E5E5E5;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            z-index: 1;
            transform: translateZ(-10px);
            transition: opacity 0.6s ease;
        }

        /* LAYER 2: L'SVG REALE DEL QR CODE */
        .hero-qr-inline-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            transform: translateZ(0px);
            transition: opacity 0.6s ease, transform 1s ease;
        }

        /* Forziamo il browser a calcolare i movimenti sul baricentro del singolo path */
        .hero-qr-inline-svg path {
            fill: #008744;
            transform-box: fill-box;
            transform-origin: center;
            transition: transform 1.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
        }

        /* ==========================================================
           FASE 2: SCORRIMENTO DEI PATH SVG VERSO LA DISPOSIZIONE A SCACCHIERA
           ========================================================== */
        
        /* I path secondari si dissolvono per non affollare la vista */
        .frenetic-chaos .hero-qr-inline-svg .p-fade {
            opacity: 0;
            transform: scale(0.3);
        }

        /* I path principali scorrono lungo le direttrici per suggerire la scacchiera */
        .frenetic-chaos .hero-qr-inline-svg .p-up {
            transform: translateY(-40px);
        }
        .frenetic-chaos .hero-qr-inline-svg .p-down {
            transform: translateY(40px);
        }
        .frenetic-chaos .hero-qr-inline-svg .p-left {
            transform: translateX(-40px);
        }
        .frenetic-chaos .hero-qr-inline-svg .p-right {
            transform: translateX(40px);
        }

        /* I tre grandi occhielli angolari si espandono per iniziare a occupare gli angoli del gioco */
        .frenetic-chaos .hero-qr-inline-svg .p-eye {
            transform: scale(1.15);
        }

        /* Quando la scacchiera finale è pronta, l'intero SVG si dissolve in modo pulito */
        .hide-qr-completely .hero-qr-inline-svg {
            opacity: 0;
            transform: scale(0.9) translateZ(-10px);
        }

        /* LAYER 3: LA SCACCHIERA FINALE (COMPARE IN COINCIDENZA DEL FLUSSO) */
        .hero-qr-animated {
            position: absolute;
            width: 71%; /* Allineata alla griglia interna dell'SVG */
            height: 71%;
            top: 14.5%;
            left: 14.5%;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            opacity: 0;
            transform: translateZ(5px) scale(0.95);
            transition: opacity 0.5s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .qr-block {
            width: 100%;
            height: 100%;
            background-color: #008744;
            transform: scale(0);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .qr-block.empty {
            opacity: 0;
        }

        /* Attivazione della Scacchiera */
        .assemble-board .hero-qr-animated {
            opacity: 1;
            transform: translateZ(5px) scale(1);
        }
        .assemble-board .qr-block {
            transform: scale(1);
        }
        .assemble-board .hero-bg-texti {
            opacity: 0.3;
        }

        /* LAYER 4: CAVALLO */
        .hero-cavallo {
            position: absolute;
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid #111;
            border-radius: 50%;
            z-index: 5;
            transform: translateZ(25px) scale(0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .assemble-board .hero-cavallo {
            transform: translateZ(25px) scale(1);
        }

        /* CLAIM FINALE */
        .hero-claim-final {
            position: absolute;
            z-index: 6;
            color: #111111;
            font-size: 1.8rem;
            font-style: italic;
            font-family: serif;
            text-align: center;
            width: 120%;
            left: -10%;
            bottom: -50px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .display-claim .hero-claim-final {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script>
        const wrapper = document.getElementById('stickerWrapper');

        function runPureSvgSequence() {
            // Momento 0: L'SVG originale è integro, denso e leggibile.

            // FASE 2: I path interni dell'SVG scivolano via lungo gli assi X e Y
            setTimeout(() => {
                wrapper.classList.add('frenetic-chaos');
            }, 2500);

            // FASE 3: L'SVG si dissolve lasciando il posto alla scacchiera 8x8 e al cavallo
            setTimeout(() => {
                wrapper.classList.add('hide-qr-completely');
                wrapper.classList.add('assemble-board');
            }, 4200);

            // FASE 4: Claim finale
            setTimeout(() => {
                wrapper.classList.add('display-claim');
            }, 5600);

            // RESET DEL LOOP
            setTimeout(() => {
                wrapper.classList.remove('display-claim');
                wrapper.classList.remove('assemble-board');
                wrapper.classList.remove('hide-qr-completely');
                wrapper.classList.remove('frenetic-chaos');
            }, 10500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            runPureSvgSequence();
            setInterval(runPureSvgSequence, 11500);
        });
    </script>
