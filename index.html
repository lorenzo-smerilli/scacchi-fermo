<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Animato - ASD Scacchi Fermo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FAFAFA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* CONTENITORE PRINCIPALE DELLO STICKER (EFFETTO PARALLASSE) */
        .hero-sticker-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            transform-style: preserve-3d;
            animation: automatic-parallax 8s infinite ease-in-out alternate;
        }

        @keyframes automatic-parallax {
            0% { transform: rotateY(-6deg) rotateX(-4deg); }
            100% { transform: rotateY(6deg) rotateX(4deg); }
        }

        /* LAYER 1: SFONDO BIANCO DELLO STICKER */
        .hero-bg-texti {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            border: 2px solid #E5E5E5;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            z-index: 1;
            transform: translateZ(-10px);
            transition: opacity 0.8s ease;
        }

        /* LAYER 2: GRIGLIA SIMIL QR CODE (MOMENTO 0: COMPATTO) */
        .hero-qr-html-grid {
            position: absolute;
            width: 72%;
            height: 72%;
            top: 14%;
            left: 14%;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(21, 1fr);
            gap: 1px; /* Evita sovrapposizioni visive nel QR statico */
            transform: translateZ(0px);
            transition: opacity 0.6s ease, transform 1s ease;
        }

        /* Il singolo cubetto verde del QR */
        .q-dot {
            background-color: #008744;
            transition: transform 1.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease, background-color 1.2s ease;
        }
        
        /* I moduli vuoti (spazi bianchi) del QR */
        .q-dot.e {
            background-color: transparent;
        }

        /* ==========================================================
           FASE 2: SCORRIMENTO COORDINATO (SPOSTAMENTO E DIVISIONE)
           ========================================================== */
        
        /* I quadratini inutili si rimpiccioliscono e svaniscono */
        .frenetic-chaos .q-dot.fade-out {
            opacity: 0;
            transform: scale(0.1);
        }

        /* I quadratini dedicati allo scorrimento scivolano verso i bordi esterni */
        .frenetic-chaos .q-dot.slide-up {
            transform: translateY(-35px) scale(0.9);
            background-color: #006633;
        }
        .frenetic-chaos .q-dot.slide-down {
            transform: translateY(35px) scale(0.9);
            background-color: #006633;
        }
        .frenetic-chaos .q-dot.slide-left {
            transform: translateX(-35px) scale(0.9);
        }
        .frenetic-chaos .q-dot.slide-right {
            transform: translateX(35px) scale(0.9);
        }

        /* I grandi occhielli angolari si allargano dando stabilità al movimento */
        .frenetic-chaos .q-dot.merge-group {
            transform: scale(1.15);
        }

        /* Dissolvenza totale del QR quando la scacchiera è pronta */
        .hide-qr-completely .hero-qr-html-grid {
            opacity: 0;
            transform: translateZ(-15px) scale(0.85);
        }


        /* LAYER 3: LA SCACCHIERA REALE 8x8 (HTML GRID) */
        .hero-qr-animated {
            position: absolute;
            width: 72%;
            height: 72%;
            top: 14%;
            left: 14%;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            opacity: 0;
            transform: translateZ(10px) scale(0.9);
            transition: opacity 0.6s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .qr-block {
            width: 100%;
            height: 100%;
            background-color: #008744;
            transform: scale(0);
            transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .qr-block.empty {
            opacity: 0;
        }

        /* Attivazione della scacchiera grande */
        .assemble-board .hero-qr-animated {
            opacity: 1;
            transform: translateZ(10px) scale(1);
        }
        .assemble-board .qr-block {
            transform: scale(1);
        }
        .assemble-board .hero-bg-texti {
            opacity: 0.25; /* Lo sfondo si attenua per far risaltare la scacchiera */
        }


        /* LAYER 4: IL CAVALLO DEGLI SCACCHI CENTRALE */
        .hero-cavallo {
            position: absolute;
            width: 80px;
            height: 80px;
            top: calc(50% - 40px);
            left: calc(50% - 40px);
            background-color: rgba(255, 255, 255, 0.96);
            border: 2px solid #111111;
            border-radius: 50%;
            z-index: 5;
            transform: translateZ(35px) scale(0) rotate(-45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .assemble-board .hero-cavallo {
            transform: translateZ(35px) scale(1) rotate(0deg);
        }


        /* LAYER 5: IL CLAIM FINALE TESTUALE */
        .hero-claim-final {
            position: absolute;
            z-index: 6;
            color: #111111;
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 2.2rem;
            text-align: center;
            width: 140%;
            left: -20%;
            bottom: -65px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .display-claim .hero-claim-final {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

    <script>
        const wrapper = document.getElementById('stickerWrapper');

        function runAnimationCycle() {
            // Stato 0: QR Code intatto, compatto e fermo.

            // FASE 2: Inizia lo scivolamento coordinato (dopo 2.5 secondi)
            setTimeout(() => {
                wrapper.classList.add('frenetic-chaos');
            }, 2500);

            // FASE 3: I quadratini completano il flusso, svaniscono e sorge la scacchiera + cavallo
            setTimeout(() => {
                wrapper.classList.add('hide-qr-completely');
                wrapper.classList.add('assemble-board');
            }, 4200);

            // FASE 4: Appare il claim testuale sotto
            setTimeout(() => {
                wrapper.classList.add('display-claim');
            }, 5600);

            // RESET DEL LOOP (Ritorno allo stato iniziale)
            setTimeout(() => {
                wrapper.classList.remove('display-claim');
                wrapper.classList.remove('assemble-board');
                wrapper.classList.remove('hide-qr-completely');
                wrapper.classList.remove('frenetic-chaos');
            }, 11000);
        }

        // Avvio automatico al caricamento e ciclo infinito coerente
        window.addEventListener('DOMContentLoaded', () => {
            runAnimationCycle();
            setInterval(runAnimationCycle, 12000);
        });
    </script>
</body>
</html>
