<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Blocco Sticker Animato - ASD Scacchi Fermo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FAFAFA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
            font-family: sans-serif;
        }

        /* IL CONTENITORE DELLO STICKER CON PARALLASSE 3D NATURALE */
        .hero-sticker-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            transform-style: preserve-3d;
            animation: automatic-parallax 8s infinite ease-in-out alternate;
        }

        @keyframes automatic-parallax {
            0% { transform: rotateY(-7deg) rotateX(-5deg); }
            100% { transform: rotateY(7deg) rotateX(5deg); }
        }

        /* LAYER 1: SFONDO GRAFICO (Simulato come background solido in questa fase di test) */
        .hero-bg-texti {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            border: 2px solid #E5E5E5;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            z-index: 1;
            transform: translateZ(-10px);
            transition: opacity 0.6s ease;
        }

        /* LAYER 2: LA GRIGLIA UNICA DEI QUADRATINI (MOMENTO 0: FORMA IL QR CODE) */
        .hero-qr-html-grid {
            position: absolute;
            width: 72%;
            height: 72%;
            top: 14%;
            left: 14%;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(21, 1fr);
            transform: translateZ(0px);
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
        }

        /* Il singolo cubetto del QR */
        .q-dot {
            background-color: #008744;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease, background-color 1s ease;
        }
        
        /* I moduli vuoti del QR code */
        .q-dot.e {
            background-color: transparent;
        }

        /* ==========================================================
           FASE 2: LO SCORRIMENTO DI DISPOSIZIONE A SCACCHIERA
           ========================================================== */
        
        /* I moduli che non servono per la scacchiera si dissolvono nello scorrimento */
        .frenetic-chaos .q-dot.fade-out {
            opacity: 0;
            transform: scale(0.2);
        }

        /* Gruppi di quadratini che scorrono verso direzioni diverse per favorire la scacchiera */
        .frenetic-chaos .q-dot.slide-up {
            transform: translateY(-25px) scale(1.05);
            background-color: #006633;
        }
        .frenetic-chaos .q-dot.slide-down {
            transform: translateY(25px) scale(1.05);
            background-color: #006633;
        }
        .frenetic-chaos .q-dot.slide-left {
            transform: translateX(-25px) scale(1.05);
        }
        .frenetic-chaos .q-dot.slide-right {
            transform: translateX(25px) scale(1.05);
        }

        /* I moduli cardine si uniscono e formano visivamente macro-strutture regolari */
        .frenetic-chaos .q-dot.merge-group {
            transform: scale(1.3);
            border-radius: 2px;
        }

        /* Nascondiamo tutto il blocco QR quando la scacchiera grande finale prende il sopravvento */
        .hide-qr-completely .hero-qr-html-grid {
            opacity: 0;
            transform: translateZ(-20px) scale(0.8);
        }

        /* LAYER 3: LA SCACCHIERA GRANDE FINALE (8x8 HTML) */
        .hero-qr-animated {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            opacity: 0;
            padding: 12px;
            transform: translateZ(5px) scale(0.9);
            transition: opacity 0.5s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .qr-block {
            width: 100%;
            height: 100%;
            background-color: #008744;
            transform: scale(0);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .qr-block.empty {
            opacity: 0;
        }

        /* Attivazione della scacchiera grande */
        .assemble-board .hero-qr-animated {
            opacity: 1;
            transform: translateZ(5px) scale(1);
        }
        .assemble-board .qr-block {
            transform: scale(1);
        }
        .assemble-board .hero-bg-texti {
            opacity: 0.3; /* Sbiadisce lo sfondo per far risaltare il gioco */
        }

        /* LAYER 4: CAVALLO (Simulato come segnaposto centrale) */
        .hero-cavallo {
            position: absolute;
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            background-color: rgba(255, 255, 255, 0.9);
            border: 3px solid #111;
            border-radius: 50%;
            z-index: 5;
            transform: translateZ(30px) scale(0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .assemble-board .hero-cavallo {
            transform: translateZ(30px) scale(1);
        }

        /* IL CLAIM FINALE TESTUALE */
        .hero-claim-final {
            position: absolute;
            z-index: 6;
            color: #111111;
            font-size: 1.8rem;
            font-style: italic;
            font-family: serif;
            text-align: center;
            width: 120%;
            left: -10%;
            bottom: -60px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .display-claim .hero-claim-final {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

    <script>
        const wrapper = document.getElementById('stickerWrapper');

        function runPureSequence() {
            // Momento 0: Il QR code HTML è compatto e fermo.

            // FASE 2: Inizia lo scorrimento direzionale dei piccoli moduli (Apertura a scacchiera)
            setTimeout(() => {
                wrapper.classList.add('frenetic-chaos');
            }, 2500);

            // FASE 3: I moduli QR completano il flusso e si manifesta la scacchiera 8x8 con il Cavallo
            setTimeout(() => {
                wrapper.classList.add('hide-qr-completely');
                wrapper.classList.add('assemble-board');
            }, 4200);

            // FASE 4: Comparsa del testo finale
            setTimeout(() => {
                wrapper.classList.add('display-claim');
            }, 5600);

            // RESET DEL LOOP
            setTimeout(() => {
                wrapper.classList.remove('display-claim');
                wrapper.classList.remove('assemble-board');
                wrapper.classList.remove('hide-qr-completely');
                wrapper.classList.remove('frenetic-chaos');
            }, 10500);
        }

        // Avvio automatico a ciclo continuo
        window.addEventListener('DOMContentLoaded', () => {
            runPureSequence();
            setInterval(runPureSequence, 11500);
        });
    </script>
</body>
</html>
