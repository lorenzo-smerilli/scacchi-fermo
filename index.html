<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASD Scacchi Fermo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;1,500&family=Montserrat+Condensed:wght@700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* RESET & VARIABILI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FAFAFA; 
            --text-color: #111111;
            --accent-green: #008744;
            --bg-archive-warm: #FDFBF7;
            --border-gray: #E5E5E5;
            --text-muted: #646866;
            --text-dark-muted: #777777;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .quote-text {
            font-family: 'EB Garamond', serif;
            font-weight: 500;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        section {
            padding: 80px 0;
        }

        /* HEADER */
        header {
            padding: 24px 0;
            background: transparent;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            display: block;
            object-fit: contain;
            filter: grayscale(100%) contrast(1.1); 
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
            line-height: 1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        nav ul a {
            font-family: 'Montserrat Condensed', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        /* HERO SECTION - PARALLAX ED SPOSTAMENTO OTTIMIZZATO */
        .hero {
            position: relative;
            height: 75vh;
            min-height: 580px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            perspective: 1200px;
        }

        /* Wrapper centrale leggermente zoommato per dare risalto ai dettagli */
        .hero-sticker-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
            animation: automatic-rotation 8s infinite ease-in-out alternate; /* Oscillazione automatica di base */
        }

        /* Animazione automatica 3D utile per Mobile e Desktop senza interazione */
        @keyframes automatic-rotation {
            0% { transform: rotateY(-6deg) rotateX(-4deg); }
            100% { transform: rotateY(6deg) rotateX(4deg); }
        }

        /* Layer 1: Sfondo Testi (svg 1) */
        .hero-bg-texti {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('1-sfondo-testi.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            transform: translateZ(-30px);
            transition: opacity 0.6s ease;
        }

        /* Layer 2: QR Code Centrale Originale (svg 2) */
        .hero-qr-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('2-qr-code.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            transform: translateZ(0px);
            transition: opacity 0.6s ease;
        }

        /* Layer 3: Matrice dei Quadrati HTML Animati */
        .hero-qr-animated {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 0;
            transform: translateZ(10px);
            opacity: 0;
            transition: opacity 0.4s ease, transform 2s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .qr-block {
            width: 100%;
            height: 100%;
            background-color: var(--accent-green);
            transition: transform 0.6s ease, opacity 0.4s ease;
            transform-origin: center;
        }

        /* Disposizione caotica iniziale (Sticker/QR) */
        .qr-block:nth-child(odd) { transform: translate(16px, -24px) scale(0.9); }
        .qr-block:nth-child(3n) { transform: translate(-28px, 12px) scale(1.05); }
        .qr-block:nth-child(5n) { transform: translate(8px, 22px) scale(0.85); }
        .qr-block:nth-child(7n) { transform: translate(-16px, -16px) scale(1); }

        .qr-block.empty { opacity: 1; }

        /* Layer INTERNO: Coordinate Scacchiera (Lettere e Numeri in Grotesk Light) */
        .board-labels {
            position: absolute;
            width: 105%;
            height: 105%;
            top: -2.5%;
            left: -2.5%;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300; /* Light */
            font-size: 0.75rem;
            color: var(--text-dark-muted);
            transition: opacity 0.8s ease 1.2s;
        }

        /* Disposizione delle coordinate lungo i bordi */
        .board-labels .letters { position: absolute; bottom: -18px; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 4%; }
        .board-labels .numbers { position: absolute; left: -18px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 4% 0; }

        /* Layer 4: Grafica Cavallo (svg 3) */
        .hero-cavallo {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('3-cavallo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            transform: translateZ(40px);
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        /* Layer Epilogo: Il Claim Minimal con Glow Neutro */
        .hero-claim-final {
            position: absolute;
            z-index: 6;
            color: var(--text-color);
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: clamp(2.2rem, 4.5vw, 3.8rem);
            text-align: center;
            width: 100%;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.95);
            text-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.8);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }


        /* ==========================================================================
           STATI DI ANIMAZIONE PILOTATI DA JAVASCRIPT
           ========================================================================== */
        
        /* Fase A: Compaiono i quadrati HTML sopra l'immagine del QR */
        .hero.show-html-squares .hero-qr-animated {
            opacity: 1;
        }

        /* Fase B: Scompaiono i vecchi layer SVG */
        .hero.hide-svg-layers .hero-bg-texti,
        .hero.hide-svg-layers .hero-qr-image,
        .hero.hide-svg-layers .hero-cavallo {
            opacity: 0;
        }

        /* Fase C: La griglia si compatta e RUOTA DI 90° per avere il campo chiaro in h1 */
        .hero.assemble-board .hero-qr-animated {
            transform: translateZ(10px) rotate(90deg); /* Rotazione ufficiale regolamentare */
        }
        .hero.assemble-board .qr-block {
            transition: transform 2s cubic-bezier(0.76, 0, 0.24, 1), opacity 1.4s ease;
            transform: translate(0, 0) scale(1) !important;
        }
        .hero.assemble-board .qr-block.empty {
            opacity: 0; 
        }
        
        /* Apparizione dei numeri e lettere coordinati */
        .hero.assemble-board .board-labels {
            opacity: 1;
        }

        /* Fase D: Comparsa finale del claim */
        .hero.display-claim .hero-claim-final {
            opacity: 1;
            transform: scale(1);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .hero.display-claim .hero-qr-animated,
        .hero.display-claim .board-labels {
            opacity: 0.12; /* Sbiadisce la scacchiera sullo sfondo del claim */
            transition: opacity 1s ease;
        }


        /* SEZIONI SITO INFERIORI */
        .intro-block { max-width: 800px; margin-bottom: 60px; }
        .intro-block h2 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 20px; line-height: 1.1; }
        .intro-block p { font-size: 1.2rem; color: var(--text-muted); }
        .press-layout { display: flex; flex-direction: column; gap: 80px; }
        .press-item { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
        .press-img-container { width: 100%; height: 380px; overflow: hidden; }
        .press-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); }
        .press-text-box span { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dark-muted); display: block; margin-bottom: 12px; }
        .press-text-box h3 { font-size: 2.2rem; line-height: 1.2; margin-bottom: 16px; }
        .press-text-box p { color: var(--text-muted); margin-bottom: 20px; }
        .read-more { font-weight: 600; font-size: 0.95rem; display: inline-block; }

        /* CAROSELLO */
        .carousel-wrapper { position: relative; width: 100%; }
        .carousel-track { display: flex; gap: 24px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 20px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        .manifesto-card { flex: 0 0 310px; display: flex; flex-direction: column; }
        .manifesto-img-box { width: 100%; height: 460px; background-color: var(--text-color); overflow: hidden; margin-bottom: 16px; }
        .manifesto-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.1); }
        .manifesto-card h3 { font-size: 1.35rem; margin-bottom: 4px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .manifesto-card span { font-size: 0.9rem; color: var(--text-muted); }
        .carousel-nav { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
        .carousel-btn { background: none; border: 1px solid var(--text-color); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* FOOTER */
        footer { background: var(--text-color); color: var(--bg-color); padding: 80px 0; margin-top: 80px; }
        .footer-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        .footer-grid h2 { font-size: 3rem; font-style: italic; }
        .footer-contacts { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 24px; }
        .footer-link-block span { display: block; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .footer-link-block a, .footer-link-block p { color: var(--bg-color); font-size: 1.4rem; font-weight: 500; }

        @media (max-width: 768px) {
            nav { display: none; }
            .press-item { grid-template-columns: 1fr; gap: 24px; }
            .footer-grid { grid-template-columns: 1fr; }
            .hero-sticker-wrapper { width: 290px; height: 290px; }
            .board-labels { display: none; } /* Rimosse le coordinate su mobile per preservare lo spazio pulito */
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo-block">
                <img src="logo-scacchi-bicolor.svg" alt="ASD Scacchi Fermo" class="logo-icon">
                <div class="logo-text">Scacchi Fermo</div>
            </div>
            <nav>
                <ul>
                    <li><a href="#chi-siamo">Chi Siamo</a></li>
                    <li><a href="#eventi">Eventi</a></li>
                    <li><a href="#contatti">Contatti</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" id="heroSection">
        <div class="hero-sticker-wrapper" id="parallaxBox">
            
            <!-- Layer 1: Sfondo Testi (svg 1) -->
            <div class="hero-bg-texti"></div>
            
            <!-- Layer 2: QR Code Centrale Ripristinato (svg 2) -->
            <div class="hero-qr-image"></div>
            
            <!-- Layer INLINE: Coordinate Lettere e Numeri Regolamentari -->
            <div class="board-labels">
                <div class="letters"><span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span></div>
                <div class="numbers"><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
            </div>

            <!-- Layer 3: Matrice Quadrati HTML (Configurazione Classica) -->
            <div class="hero-qr-animated">
                <!-- Righe Alternate Standard FIDE -->
                <div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div>
                <div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div>
                <div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div>
                <div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div>
                <div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div>
                <div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div>
                <div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div>
                <div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div><div class="qr-block empty"></div><div class="qr-block"></div>
            </div>

            <!-- Layer 4: Grafica Cavallo (svg 3) -->
            <div class="hero-cavallo"></div>
        </div>

        <div class="hero-claim-final">“Fermo, eppur si muove”</div>
    </section>

    <!-- IL RESTO DEL SITO CONTINUA QUI SENZA INTERRUZIONI -->
    <main class="container">
        <section id="chi-siamo">
            <div class="intro-block">
                <h2>Pedoni e Alfieri: chi siamo</h2>
                <p>L'ASD Scacchi Fermo promuove e diffonde l'alto valore educativo e la cultura degli scacchi sul territorio fermano.</p>
            </div>
        </section>
    </main>

    <script>
        const hero = document.getElementById('heroSection');
        const parallaxBox = document.getElementById('parallaxBox');
        let useDeviceOrientation = false;

        // ACCELEROMETRO / GIROSCOPIO PER MOBILE (Se supportato e concesso)
        if (window.DeviceOrientationEvent) {
            // Richiesta permessi espliciti per dispositivi iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                hero.addEventListener('click', () => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') { useDeviceOrientation = true; }
                        });
                }, { once: true });
            } else {
                useDeviceOrientation = true;
            }
        }

        window.addEventListener('deviceorientation', (e) => {
            if (!useDeviceOrientation || hero.classList.contains('assemble-board')) return;
            // Intercetta l'inclinazione del telefono (gamma = roll / beta = pitch)
            const tiltX = Math.min(Math.max(e.gamma, -15), 15) / 1.5;
            const tiltY = Math.min(Math.max(e.beta - 45, -15), 15) / 1.5; // Tarato su inclinazione lettura comoda 45°
            
            parallaxBox.style.animation = 'none'; // Spegne l'auto-oscillazione se risponde al sensore
            parallaxBox.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
        });

        // INTERAZIONE MOUSE TRADIZIONALE (Desktop)
        window.addEventListener('mousemove', (e) => {
            if (useDeviceOrientation || hero.classList.contains('assemble-board')) return;
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            parallaxBox.style.animation = 'none';
            parallaxBox.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // TIME REGULATOR - LOOP PRINCIPALE
        function runStickerSequence() {
            // Fase iniziale statica ("Sticker") con oscillazione 3D attiva per 3.5 secondi.

            // 1. Sovrapposizione istantanea dei quadrati HTML sopra al QR code
            setTimeout(() => {
                hero.classList.add('show-html-squares');
            }, 3500);

            // 2. Movimento fluido: I vecchi SVG spariscono e la griglia si muove ruotando di 90 gradi
            setTimeout(() => {
                parallaxBox.style.animation = 'none';
                parallaxBox.style.transform = `rotateY(0deg) rotateX(0deg)`; // Centralizzazione d'asse
                hero.classList.add('hide-svg-layers');
                hero.classList.add('assemble-board');
            }, 4000);

            // 3. Apparizione del Claim
            setTimeout(() => {
                hero.classList.add('display-claim');
            }, 6200);

            // 4. RESET VELOCE: Ritorno istantaneo allo stato iniziale dei 3 SVG
            setTimeout(() => {
                hero.classList.remove('display-claim');
                hero.classList.remove('assemble-board');
                hero.classList.remove('hide-svg-layers');
                hero.classList.remove('show-html-squares');
                // Ripristina l'animazione automatica di default
                parallaxBox.style.animation = 'automatic-rotation 8s infinite ease-in-out alternate';
            }, 9800);
        }

        window.addEventListener('DOMContentLoaded', () => {
            runStickerSequence();
            setInterval(runStickerSequence, 10800);
        });
    </script>
</body>
</html>
